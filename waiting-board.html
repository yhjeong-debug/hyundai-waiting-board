<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웨이팅 리스트</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f5f5f7; padding: 32px 24px; }
  h1 { text-align: center; font-size: 36px; font-weight: 700; color: #1d1d1f; margin-bottom: 10px; }
  .subtitle { text-align: center; color: #86868b; font-size: 18px; margin-bottom: 32px; }
  .board { max-width: 960px; margin: 0 auto; background: #fff; border-radius: 20px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  thead th { background: #1d1d1f; color: #fff; padding: 18px 12px; font-size: 20px; font-weight: 600; }
  thead th:first-child { width: 120px; }
  tbody td { padding: 0; border-bottom: 1px solid #e8e8ed; text-align: center; vertical-align: middle; }
  tbody td:first-child { font-weight: 600; font-size: 20px; color: #1d1d1f; background: #fafafa; padding: 16px 8px; }
  .slot { padding: 14px 8px; user-select: none; min-height: 64px; display: flex; align-items: center; justify-content: center; border-left: 1px solid #e8e8ed; }
  body.admin .slot { cursor: pointer; transition: background 0.15s; }
  body.admin .slot:hover { filter: brightness(0.95); }

  .status-walkin-full { background: #d1f5d3; color: #1a7a2e; }
  .status-reserved { background: #ffd6d6; color: #c0392b; }
  .status-walkin-cardio { background: #d6ecff; color: #1a5fa8; }
  .status-unavailable { background: #e8e8ed; color: #86868b; }

  .slot span { font-size: 17px; font-weight: 600; line-height: 1.4; pointer-events: none; }

  .actions { max-width: 960px; margin: 24px auto 0; display: flex; gap: 12px; justify-content: center; }
  .actions button { padding: 14px 28px; border: none; border-radius: 10px; font-size: 17px; font-weight: 600; cursor: pointer; transition: transform 0.1s; }
  .actions button:active { transform: scale(0.96); }
  .btn-save { background: #1d1d1f; color: #fff; }
  .btn-load { background: #e8e8ed; color: #1d1d1f; }
  .btn-reset { background: #ffd6d6; color: #c0392b; }

  .btn-fullscreen { position: fixed; top: 16px; right: 16px; background: #1d1d1f; color: #fff; border: none; border-radius: 10px; padding: 10px 16px; font-size: 15px; font-weight: 600; cursor: pointer; z-index: 100; opacity: 0.7; transition: opacity 0.2s; }
  .btn-fullscreen:hover { opacity: 1; }

  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: #1d1d1f; color: #fff; padding: 12px 28px; border-radius: 10px; font-size: 17px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  @media (min-width: 1024px) {
    h1 { font-size: 42px; }
    .subtitle { font-size: 20px; }
    thead th { font-size: 22px; padding: 20px 12px; }
    tbody td:first-child { font-size: 22px; }
    .slot { min-height: 72px; padding: 16px 10px; }
    .slot span { font-size: 19px; }
  }
</style>
</head>
<body>

<button class="btn-fullscreen" onclick="toggleFullscreen()">전체화면</button>
<h1>웨이팅 리스트</h1>
<p class="subtitle">현장 참여 문의는 인포데스크로 부탁드립니다!</p>

<div class="board">
  <table>
    <thead>
      <tr>
        <th>시간</th>
        <th>1인</th>
        <th>2인</th>
      </tr>
    </thead>
    <tbody id="board-body"></tbody>
  </table>
</div>


<div class="actions" id="refresh-action">
  <button class="btn-load" onclick="manualRefresh()">최신화</button>
</div>

<div class="actions" id="admin-actions" style="display:none;">
  <button class="btn-save" onclick="saveState()">저장</button>
  <button class="btn-load" onclick="loadState()">불러오기</button>
  <button class="btn-reset" onclick="resetState()">초기화</button>
</div>

<div class="toast" id="toast"></div>

<script>
const STATUSES = [
  { key: 'walkin-full',   label: '워크인 가능\n(유산소+자세)', cls: 'status-walkin-full' },
  { key: 'reserved',      label: '예약 완료',                  cls: 'status-reserved' },
  { key: 'walkin-cardio', label: '워크인 가능\n(유산소)',       cls: 'status-walkin-cardio' },
  { key: 'unavailable',   label: '예약 불가',                  cls: 'status-unavailable' },
];

const TIMES = [];
for (let h = 11; h <= 19; h++) {
  TIMES.push(`${h}:00`);
  if (h < 19 || h === 19) TIMES.push(`${h}:30`);
}
// 11:00 ~ 19:30
const FILTERED = TIMES.filter(t => {
  const [h, m] = t.split(':').map(Number);
  return (h === 11 || (h > 11 && h < 19) || (h === 19 && m <= 30));
});

const COLS = ['1인', '2인'];
const API_URL = 'https://4vwrcdvf76i5kdtf5g4roaeihu0pspuy.lambda-url.ap-northeast-2.on.aws/';

let state = {};

function initState() {
  state = {};
  FILTERED.forEach(t => {
    COLS.forEach(c => {
      const m = t.split(':')[1];
      state[`${t}_${c}`] = m === '00' ? 1 : 2;
    });
  });
}

function render() {
  const tbody = document.getElementById('board-body');
  tbody.innerHTML = '';
  FILTERED.forEach(time => {
    const tr = document.createElement('tr');
    const tdTime = document.createElement('td');
    tdTime.textContent = time;
    tr.appendChild(tdTime);

    COLS.forEach(col => {
      const td = document.createElement('td');
      const key = `${time}_${col}`;
      const idx = state[key] || 0;
      const s = STATUSES[idx];
      td.innerHTML = `<div class="slot ${s.cls}" data-key="${key}"><span>${s.label}</span></div>`;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });

  if (isAdmin) {
    document.querySelectorAll('.slot').forEach(el => {
      el.addEventListener('click', () => {
        const key = el.dataset.key;
        state[key] = ((state[key] || 0) + 1) % STATUSES.length;
        render();
        saveToCloud();
      });
    });
  }
}

// 클라우드 저장
function saveToCloud() {
  fetch(API_URL, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(state)
  }).then(r => {
    if (r.ok) showToast('저장됨');
    else showToast('저장 실패: ' + r.status);
  }).catch(e => showToast('저장 실패: ' + e.message));
}

// 클라우드에서 불러오기
function loadFromCloud() {
  return fetch(API_URL)
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(data => {
      if (data && Object.keys(data).length > 0) {
        state = data;
        render();
        return true;
      }
      return false;
    })
    .catch(e => {
      console.error('loadFromCloud error:', e);
      showToast('불러오기 실패: ' + e.message);
      return false;
    });
}

function saveState() {
  saveToCloud();
}

function loadState() {
  loadFromCloud().then(ok => {
    showToast(ok ? '불러왔습니다' : '저장된 데이터가 없습니다');
  });
}

function resetState() {
  if (!confirm('모든 슬롯을 초기화하시겠습니까?')) return;
  initState();
  render();
  saveToCloud();
  showToast('초기화되었습니다');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

function manualRefresh() {
  loadFromCloud().then(ok => {
    showToast(ok ? '최신화 완료' : '변경사항 없음');
  });
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// admin mode: add ?admin to URL to enable editing
const isAdmin = new URLSearchParams(window.location.search).has('admin');
if (isAdmin) {
  document.body.classList.add('admin');
  document.getElementById('admin-actions').style.display = 'flex';
}

// init: 먼저 기본값으로 표시 후, 클라우드에서 덮어쓰기
initState();
render();
loadFromCloud();

// 배포용: 30분마다 자동 동기화
if (!isAdmin) {
  setInterval(() => loadFromCloud(), 30 * 60 * 1000);
}
</script>
</body>
</html>
